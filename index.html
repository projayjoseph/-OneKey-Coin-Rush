<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🪙 OneKey Coin Rush</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

    <h1>🪙 OneKey Coin Rush</h1>


    <div class="coin-box">

        <h2>
            <span id="coins">0</span>
        </h2>

        <p>
            Coins per press:
            <strong id="power">1</strong>
        </p>

    </div>



    <div id="message">
        Press SPACE to earn coins!
    </div>



    <div id="upgrade">

        <div>
            🛒 Upgrade: Bigger Click
        </div>

        <br>

        <div>
            Cost:
            <span id="cost">50</span>
            coins
        </div>

        <br>

        <small>
            Hold SPACE for 1 second to buy
        </small>

    </div>




    <div class="achievements">

        <h3>
            🏆 Achievements
        </h3>


        <ul id="achievements">

            <!-- Achievements appear here -->

        </ul>

    </div>



</div>



<script src="script.js"></script>

</body>
</html>
